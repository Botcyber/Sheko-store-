<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>إدارة الأخبار - VIBE Admin</title>

<style>
body{
  font-family:'Cairo',sans-serif;
  margin:0;
  background:#f1f1f1;
}
.top-bar{
  background:#222;
  color:white;
  padding:12px;
  text-align:center;
  font-size:22px;
  font-weight:bold;
}
.container{
  max-width:900px;
  margin:20px auto;
  padding:20px;
  background:white;
  border-radius:12px;
}
.news-card{
  background:#fff;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
  border-left:6px solid gold;
}
.news-title{font-size:18px;font-weight:bold;}
.news-text{margin-top:6px;color:#444;}
.news-img{
  width:140px;
  border-radius:10px;
  margin-top:8px;
}
.btn{
  padding:6px 12px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-left:5px;
  font-weight:bold;
}
.btn-edit{background:#007bff;color:white;}
.btn-delete{background:#dc3545;color:white;}
input,textarea{
  width:100%;
  padding:8px;
  margin-bottom:10px;
  border-radius:6px;
  border:1px solid #ccc;
}
</style>
</head>

<body>

<div class="top-bar">إدارة الأخبار</div>

<div class="container">
  <h3>إضافة خبر</h3>
  <input id="title" placeholder="عنوان الخبر">
  <textarea id="text" rows="4" placeholder="نص الخبر"></textarea>
  <input type="file" id="image">
  <button class="btn btn-edit" onclick="addNews()">➕ إضافة</button>
</div>

<div class="container">
  <h3>كل الأخبار</h3>
  <div id="newsList"></div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAYcZ2_RjaI4fjP14QlqbUbL3rWvPPWnas",
  authDomain: "sheko-store.firebaseapp.com",
  databaseURL: "https://sheko-store-default-rtdb.firebaseio.com",
  projectId: "sheko-store"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const list = document.getElementById("newsList");

/* إضافة خبر */
function addNews(){
  const title = titleInput.value.trim();
  const text  = textInput.value.trim();
  const file  = imageInput.files[0];

  if(!title || !text){
    alert("اكتب العنوان والنص");
    return;
  }

  if(file){
    const r = new FileReader();
    r.onload = e => save(title,text,e.target.result);
    r.readAsDataURL(file);
  }else{
    save(title,text,"");
  }
}

function save(title,text,image){
  db.ref("news").push({
    title,
    text,
    image,
    time: Date.now()
  });
  titleInput.value="";
  textInput.value="";
  imageInput.value="";
}

/* عرض الأخبار (الحل الصحيح) */
db.ref("news").orderByChild("time").on("child_added",snap=>{
  const n = snap.val();
  const key = snap.key;

  const div = document.createElement("div");
  div.className="news-card";
  div.id=key;
  div.innerHTML=`
    <div class="news-title">${n.title}</div>
    ${n.image ? `<img class="news-img" src="${n.image}">` : ""}
    <div class="news-text">${n.text}</div>
    <br>
    <button class="btn btn-edit" onclick="editNews('${key}')">تعديل</button>
    <button class="btn btn-delete" onclick="deleteNews('${key}')">حذف</button>
  `;
  list.prepend(div); // الأحدث فوق
});

/* حذف */
function deleteNews(key){
  if(confirm("حذف الخبر؟")){
    db.ref("news/"+key).remove();
    document.getElementById(key).remove();
  }
}

/* تعديل */
function editNews(key){
  db.ref("news/"+key).once("value").then(s=>{
    const d=s.val();
    let t=prompt("العنوان",d.title);
    if(t===null) return;
    let x=prompt("النص",d.text);
    if(x===null) return;

    db.ref("news/"+key).update({
      title:t,
      text:x,
      time:Date.now()
    });
  });
}

/* عناصر */
const titleInput=document.getElementById("title");
const textInput=document.getElementById("text");
const imageInput=document.getElementById("image");
</script>

</body>
</html>
