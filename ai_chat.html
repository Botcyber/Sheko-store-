<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title>بوت VIBE Studio</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo&display=swap');

    body {
      font-family: 'Cairo', sans-serif;
      background: #0d0d0d;
      color: #fff;
      margin: 0;
      padding: 0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      max-width: 480px;
      margin: auto;
    }

    h2 {
      text-align: center;
      font-size: 1.3rem;
      padding: 12px;
      margin: 0;
    }

    .chat-box {
      flex-grow: 1;
      padding: 10px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .chat-message {
      max-width: 85%;
      padding: 10px 14px;
      border-radius: 16px;
      animation: slideFade 0.4s ease-out forwards;
      opacity: 0;
      transform: translateY(15px);
    }

    .user {
      background-color: #ffc107;
      color: #000;
      align-self: flex-end;
      border-bottom-right-radius: 0;
    }

    .bot {
      background-color: #1f1f1f;
      color: #fff;
      align-self: flex-start;
      border-bottom-left-radius: 0;
    }

    @keyframes slideFade {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .fab-button {
      background: #ffc107;
      color: #000;
      font-weight: bold;
      border: none;
      border-radius: 30px;
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
      width: 95%;
      margin: 10px auto;
      position: fixed;
      bottom: 15px;
      left: 50%;
      transform: translateX(-50%);
      box-shadow: 0 0 10px #00000055;
      z-index: 1000;
    }

    .question-list {
      display: none;
      flex-direction: column;
      gap: 10px;
      background: #1a1a1a;
      padding: 15px;
      overflow-y: auto;
      max-height: 60vh;
      position: fixed;
      bottom: 70px;
      left: 0;
      right: 0;
      z-index: 999;
      animation: fadeSlideIn 0.4s ease forwards;
      border-top: 1px solid #333;
      border-radius: 16px 16px 0 0;
    }

    .question-card {
      background: #292929;
      padding: 12px;
      border-radius: 10px;
      cursor: pointer;
      border: 1px solid #444;
      transition: background 0.3s, transform 0.3s;
    }

    .question-card:hover {
      background: #383838;
      transform: scale(1.02);
    }

    @keyframes fadeSlideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    img.bot-icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
    }
  </style>
</head>
<body>

  <h2>🤖 بوت Sheko Store</h2>

  <div class="chat-box" id="chatBox" aria-live="polite"></div>

  <button class="fab-button" onclick="toggleQuestions()">📌 اختر سؤالك</button>

  <div class="question-list" id="questionList"></div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const questionList = document.getElementById("questionList");

    const knowledgeBase = {
      "VIBE Studio": "هوا استوديو لصناع الموسيقي ومحترفين الغناء واقامة الحفلات الكبيره .",
      "  الاعضاء المميزين في الاستوديو": "ليس هناك بعد.",
      "كيفية طلب خدمه": "اختار الخدمه من لوحة التحكم واختار نوع الخدمه التي تريدها واختار الباقه ومن ثم كتابه المطلوب في الاسفل واضفط علي ارسال الطلب.",
      "كيف اراجع طلباتي": "اذهب الي زر طلباتك في لوحة التحكم وتابع طلبك واعرف طلباتك السابقه.",
      "ماذا تعني قيد التنفيذ و تم و مرفوض": "قيد التنفيذ يعني طلبك قيد التنفيذ من الموقع. تم يعني طلبك قد تم ونجح. مرفوض يعني تم رفضه لاسباب تتعلق بي (id خطأ او الرابط خطأ او الرقم الهاتف خطأ وهكذا).",
      "ماهوا الدردشه": "الدردشه هي وسيله للتحدث مع جميع المستخدمين الذين سجلو في الموقع يمكنك التحدث بحريه لكن تجنب اي كلام او وسيله قد تسبب في حظرك من الدردشه.",
      "ماهي الشارات": "هي شارات تعطي للمستخدمين حسب انفاقهم في الموقع او الشركاء الذين قد شاركو في ترويج الموقع او مدة استخدامهم للموقع.",
      "كيف اصبح من شركاء الموقع": "الترويج للموقع و انفاقهم الكثير من الرصيد و يمكن للشريك ومتأهل لاستخدام خدمات الموقع كأدمن دون حدوث اي اخطاء من الشريك او النصب.",
      "ماهوا التصنيف": "هي قائمه تظهر فيها المستخدمين الاكثر إنفاقا للرصيد كلما انفقت رصيد اكتر يرتقي ترتيبك.",
      "ماهي عجلة الحظ": "هي عجله تتيح للمستخدمين اداره العجله مره واحده يوميا للحصول علي الهدايا ويمكنك اداره العجله من النقاط التي لديك في حسابك.",
      "كيف الحصول علي نقاط": "يمكنك الحصول علي النقاط عندما تنفق رصيد تأخذ نقاط حسب انفاقك.",
      "ماذا افعل في فريق الدعم": "للشكاوي او الاستفسارات فقط وليس الدردشه الحره.",
      "ماهي التقييمات": "لاضافه تقييم للموقع حسب تجربتك للموقع وتختار عدد النجوم ويستطيع المستخدمين ان يعرفو تقييمك وان تعرف تقييم الاخرين وهكذا.",
      "ماهي الاخبار": "هي صفحه مخصصه لاخبار الموقع وكل شئ يخص الموقع.",
      "كيف اضيف اسمي وصورتي بكي تظهر في التصنيفات والدردشه": "اذهب الي حسابك ومن هناك تستطيع ان تكتب اسمك وان تضع صورتك من اعلي الصفحه بكل سهوله مع تجنب اي صوره غير لائقه او اسم غير لائق.",
      "اخري؟": `انضم الينا لكي تتابع كل شئ<br><br>📢 <a href="https://t.me/sheko_store_website" target="_blank" style="color:#ffc107;">قناة التليجرام</a><br>💬 <a href="https://chat.whatsapp.com/EpJHhfUBTro8TZKx901A9S?mode=r_t" target="_blank" style="color:#ffc107;">جروب الواتساب</a>`
    };

    function toggleQuestions() {
      questionList.style.display = questionList.style.display === "flex" ? "none" : "flex";
    }

    function appendMessage(sender, text, className) {
      const msg = document.createElement("div");
      msg.classList.add("chat-message", className);

      if (className === "bot") {
        msg.innerHTML = `
          <div style="display: flex; align-items: flex-start; gap: 10px;">
            <img src="https://cdn-icons-png.flaticon.com/512/4712/4712106.png" alt="bot" class="bot-icon" />
            <div>
              <div style="font-weight: bold; color: #00e0ff; margin-bottom: 4px;">بوت شيكو ستور ✅</div>
              <div>${text}</div>
            </div>
          </div>
        `;
      } else {
        msg.innerHTML = `<strong>${sender}</strong><br>${text}`;
      }

      chatBox.appendChild(msg);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendBotReply(question) {
      appendMessage("أنت", question, "user");
      const answer = knowledgeBase[question] || "عذرًا، لم أفهم سؤالك.";
      setTimeout(() => {
        appendMessage("البوت", answer, "bot");
      }, 400);
    }

    for (const question in knowledgeBase) {
      const btn = document.createElement("div");
      btn.className = "question-card";
      btn.textContent = question;
      btn.onclick = () => {
        sendBotReply(question);
        questionList.style.display = "none";
      };
      questionList.appendChild(btn);
    }
  </script>

</body>
</html>
