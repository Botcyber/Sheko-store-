<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <title> الاخبار - VIBE </title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    crossorigin="anonymous" />

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      margin: 0;
      background: #f1f1f1;
    }

    .top-bar {
      background: #222;
      padding: 10px 20px;
      color: white;
    }

    .nav-icons {
      display: flex;
      gap: 25px;
      flex-direction: column;
      margin-top: 10px;
    }

    .nav-icons a {
      color: white;
      text-decoration: none;
      display: flex;
      align-items: center;
      font-size: 14px;
      gap: 8px;
    }

    .nav-icons a:hover {
      color: #ffb700;
    }

    .user-area {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      gap: 15px;
      font-size: 15px;
    }

    button:hover {
      background: #ffb700;
      color: #222;
    }

    @keyframes glowTitle {
      0% { text-shadow: 0 0 6px #ffb700; }
      50% { text-shadow: 0 0 18px #ffd966; }
      100% { text-shadow: 0 0 6px #ffb700; }
    }

    /* حاوية الأخبار */
    .news-container {
      max-width: 900px;
      margin: 25px auto;
      padding: 10px;
    }

    /* كارت الخبر */
    .news-card {
      background: white;
      margin-bottom: 18px;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,.08);
      animation: fadeIn .4s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .news-img {
      width: 100%;
      height: 220px;
      object-fit: cover;
      display: block;
    }

    .news-title {
      font-size: 20px;
      font-weight: 800;
      padding: 12px 15px 5px 15px;
      line-height: 1.6;
    }

    .news-text {
      font-size: 15px;
      color: #444;
      padding: 0 15px 15px 15px;
      line-height: 1.8;
    }
  </style>
</head>

<body>

  <div class="top-bar">

    <div style="
      width:100%;
      text-align:center;
      font-size:30px;
      font-weight:bold;
      margin-bottom:8px;
      color:#ffcc33;
      letter-spacing:2px;
      text-transform:uppercase;
      text-shadow:0 0 8px rgba(255,204,0,.8);
      animation:glowTitle 2s infinite ease-in-out;
    ">
      VIBE STUDIO
    </div>

    <nav class="nav-icons">
      <a href="account.html"><i class="fa fa-user"></i><span>حسابك</span></a>
      <a href="support_chat.html"><i class="fa fa-headset"></i><span>للتواصل مع الفريق</span></a>
    </nav>

    <div class="user-area">
      <button onclick="logout()">
        <i class="fa fa-sign-out-alt"></i> خروج
      </button>
    </div>

  </div>

  <div class="news-container" id="newsBox">
    <div style="text-align:center;font-size:22px;font-weight:bold;">📰 الأخبار</div>
  </div>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAYcZ2_RjaI4fjP14QlqbUbL3rWvPPWnas",
      authDomain: "sheko-store.firebaseapp.com",
      databaseURL: "https://sheko-store-default-rtdb.firebaseio.com",
      projectId: "sheko-store",
      storageBucket: "sheko-store.appspot.com",
      messagingSenderId: "113892775847",
      appId: "1:113892775847:web:2aa4c11c3f5dd1d15f0882"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    auth.onAuthStateChanged(user => {
      if (!user) location.href = "index.html";
    });

    function logout() {
      auth.signOut().then(() => location.href = "index.html");
    }

    const newsBox = document.getElementById("newsBox");

    /* تحميل الأخبار – الحل النهائي */
    db.ref("news")
      .orderByChild("time")
      .on("child_added", snap => {

        const n = snap.val();

        const card = document.createElement("div");
        card.className = "news-card";

        card.innerHTML = `
          ${n.image ? `<img class="news-img" src="${n.image}">` : ""}
          <div class="news-title">${n.title || ""}</div>
          <div class="news-text">${n.text || ""}</div>
        `;

        /* الأحدث في الأعلى */
        newsBox.insertBefore(card, newsBox.children[1]);
      });
  </script>

</body>
</html>
