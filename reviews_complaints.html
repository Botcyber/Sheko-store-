<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>تقييمات المستخدمين</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>

<style>
body { font-family:'Cairo',sans-serif; background:#e3f2fd; margin:0; padding:20px; color:#222; }
.container { max-width:900px; margin:auto; background:white; padding:30px 40px; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.1); }
h2 { text-align:center; color:#1976d2; margin-bottom:25px; font-weight:700; }

.review { display:flex; gap:15px; background:#f1f9ff; border-radius:15px; padding:15px; margin-bottom:20px; align-items:flex-start; box-shadow:0 3px 12px rgba(0,0,0,0.1); }
.user-img { width:60px; height:60px; border-radius:50%; object-fit:cover; }
.review-content { flex:1; }
.review-name { font-weight:700; margin-bottom:5px; display:flex; align-items:center; gap:10px; }
.stars { display:flex; gap:5px; font-size:18px; color:#ffd700; margin-bottom:8px; }
.review-text { font-size:15px; }
.delete-btn { background:#dc3545; color:white; border:none; border-radius:8px; padding:6px 12px; font-size:14px; cursor:pointer; transition:0.3s; }
.delete-btn:hover { background:#b71c1c; }
</style>
</head>
<body>
<div class="container">
  <h2 id="reviewsTitle">⭐ تقييمات المستخدمين</h2>
  <div id="reviewsList">جار التحميل...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAYcZ2_RjaI4fjP14QlqbUbL3rWvPPWnas",
  authDomain: "sheko-store.firebaseapp.com",
  databaseURL: "https://sheko-store-default-rtdb.firebaseio.com",
  projectId: "sheko-store",
  storageBucket: "sheko-store.appspot.com",
  messagingSenderId: "113892775847",
  appId: "1:113892775847:web:2aa4c11c3f5dd1d15f0882"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

const adminUID = "mlifDgEAkKMaOeuUq63cs5NAkV93";
let currentUser = null;

// الترجمات حسب اللغة
const translations = {
  ar: { noReviews:"لا توجد تقييمات بعد", deleteReview:"🗑 حذف التقييم", reviewsTitle:"⭐ تقييمات المستخدمين" },
  en: { noReviews:"No reviews yet", deleteReview:"🗑 Delete Review", reviewsTitle:"⭐ User Reviews" }
};

function getUserLang() {
  return localStorage.getItem("lang") || "ar";
}

function applyLang() {
  const lang = getUserLang();
  document.body.dir = lang==="ar" ? "rtl" : "ltr";
  document.getElementById("reviewsTitle").innerText = translations[lang].reviewsTitle;
  loadReviews(); // إعادة تحميل التقييمات لترجمة النصوص
}

auth.onAuthStateChanged(user => {
  if(!user) return location.href="index.html";
  currentUser = user;
  applyLang(); // تحميل اللغة والتقييمات
});

// دالة تحميل التقييمات
function loadReviews(){
  const lang = getUserLang();
  const container = document.getElementById("reviewsList");
  db.ref("reviews").once("value").then(snapshot=>{
    container.innerHTML="";
    if(!snapshot.exists()){ 
      container.innerHTML=`<p>${translations[lang].noReviews}</p>`; 
      return; 
    }
    const reviews = snapshot.val();
    const entries = Object.entries(reviews).sort((a,b)=>new Date(b[1].timestamp)-new Date(a[1].timestamp));
    entries.forEach(([key,r])=>{
      const div = document.createElement("div");
      div.className="review";

      // صورة واسم المستخدم
      div.innerHTML = `
        <img src="${r.photo || 'https://via.placeholder.com/60'}" class="user-img"/>
        <div class="review-content">
          <div class="review-name">${r.name}</div>
          <div class="stars">${'★'.repeat(r.stars)}</div>
          <div class="review-text">${r.text}</div>
        </div>
      `;

      // زر الحذف للأدمن فقط
      if(currentUser.uid === adminUID){
        const delBtn = document.createElement("button");
        delBtn.className="delete-btn";
        delBtn.textContent = translations[lang].deleteReview;
        delBtn.onclick = ()=>{ 
          if(confirm(lang==="ar"?"هل أنت متأكد من حذف هذا التقييم؟":"Are you sure to delete this review?")) 
            db.ref("reviews/"+key).remove(); 
        };
        div.appendChild(delBtn);
      }

      container.appendChild(div);
    });
  });
}

// مراقبة تغيير اللغة مباشرة من localStorage
window.addEventListener("storage", e=>{
  if(e.key==="lang"){
    applyLang();
  }
});
</script>
</body>
</html>
