<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>التقييمات</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo&display=swap');
    body { font-family: 'Cairo', sans-serif; background: #e3f2fd; margin:0; padding:20px; color:#222; }
    .container { max-width:900px; margin:auto; background:white; padding:30px 40px; border-radius:16px; box-shadow:0 10px 25px rgba(0,0,0,0.1); }
    h2 { text-align:center; color:#1976d2; margin-bottom:25px; font-weight:700; letter-spacing:1.2px; }
    label { font-weight:600; margin-top:15px; display:block; }
    input[type="text"], textarea { width:100%; padding:12px 15px; margin-top:8px; border-radius:10px; border:1.8px solid #90caf9; font-size:16px; resize:vertical; transition:border-color 0.3s ease; }
    input[type="text"]:focus, textarea:focus { outline:none; border-color:#1976d2; box-shadow:0 0 8px #90caf9aa; }
    button { background-color:#1976d2; color:white; font-weight:700; border:none; border-radius:12px; padding:15px; font-size:18px; margin-top:20px; cursor:pointer; }
    .stars { display:flex; justify-content:center; gap:8px; margin:15px 0 10px 0; }
    .stars span { font-size:28px; cursor:pointer; color:#222; transition: color 0.3s ease, transform 0.3s ease, text-shadow 0.6s ease; user-select:none; }
    .stars span.active { color:#ffd700; text-shadow:0 0 8px #ffd700cc,0 0 20px #ffec8599,0 0 30px #fff48fbb; }
    .review { background:#f1f9ff; border-left:6px solid #1976d2; padding:20px 25px; margin-bottom:20px; border-radius:12px; position:relative; display:flex; flex-direction:column; gap:8px; }
    .review-header { display:flex; align-items:center; gap:12px; }
    .review-header img { width:40px; height:40px; border-radius:50%; object-fit:cover; }
    .meta { font-size:13px; color:#555; font-style:italic; }
    .delete-btn { margin-top:10px; background:#e53935; color:white; border:none; border-radius:10px; padding:8px 15px; font-size:14px; cursor:pointer; }
    .reactions { display:flex; gap:25px; margin-top:10px; justify-content:center; }
    .reaction-btn { font-size:22px; cursor:pointer; display:flex; flex-direction:column; align-items:center; color:#90a4ae; transition:color 0.3s ease; position:relative; }
    .reaction-btn.active { color:#1976d2; animation:pulse 1.2s infinite; }
    .reaction-count { font-size:14px; margin-top:4px; font-weight:600; }
    @keyframes pulse { 0%,100%{transform:scale(1);}50%{transform:scale(1.3);} }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="reviewsTitle">⭐ تقييمات المستخدمين</h2>

    <label id="starsLabel">اختر عدد النجوم:</label>
    <div class="stars" id="starRating">
      <span data-value="1">&#9733;</span>
      <span data-value="2">&#9733;</span>
      <span data-value="3">&#9733;</span>
      <span data-value="4">&#9733;</span>
      <span data-value="5">&#9733;</span>
    </div>

    <textarea id="reviewText" placeholder="اكتب تعليقك هنا..." rows="4"></textarea>
    <button id="submitReviewBtn">إرسال التقييم</button>

    <div class="section">
      <h2 id="reviewsListTitle">⭐ User reviews / تقييمات المستخدمين ⭐</h2>
      <div id="reviewsList">جار التحميل...</div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
  const firebaseConfig = {
    apiKey: "AIzaSyAYcZ2_RjaI4fjP14QlqbUbL3rWvPPWnas",
    authDomain: "sheko-store.firebaseapp.com",
    databaseURL: "https://sheko-store-default-rtdb.firebaseio.com",
    projectId: "sheko-store",
    storageBucket: "sheko-store.appspot.com",
    messagingSenderId: "113892775847",
    appId: "1:113892775847:web:2aa4c11c3f5dd1d15f0882"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.database();

  // ترجمة كل النصوص
  const t = {
    ar: {
      reviewsTitle: "⭐ تقييمات المستخدمين",
      reviewPlaceholder: "اكتب تعليقك هنا...",
      starsLabel: "اختر عدد النجوم:",
      submitBtn: "إرسال التقييم",
      deleteBtn: "🗑 حذف التقييم",
      starsError: "اختر عدد النجوم واكتب تعليقك."
    },
    en: {
      reviewsTitle: "⭐ User Reviews",
      reviewPlaceholder: "Write your review here...",
      starsLabel: "Select star rating:",
      submitBtn: "Submit Review",
      deleteBtn: "🗑 Delete Review",
      starsError: "Select star rating and write a comment."
    }
  };

  let currentUid=null;
  let currentUserName="";
  let currentUserImg="";

  function applyLang(lang){
    localStorage.setItem("lang",lang);
    document.body.style.direction = (lang==="ar"?"rtl":"ltr");
    document.getElementById("reviewsTitle").innerText = t[lang].reviewsTitle;
    document.getElementById("reviewText").placeholder = t[lang].reviewPlaceholder;
    document.getElementById("starsLabel").innerText = t[lang].starsLabel;
    document.getElementById("submitReviewBtn").innerText = t[lang].submitBtn;
  }
  applyLang(localStorage.getItem("lang")||"ar");

  auth.onAuthStateChanged(user=>{
    if(!user) return location.href="index.html";
    currentUid=user.uid;
    db.ref("users/"+user.uid+"/username").once("value").then(snap=>{if(snap.exists()) currentUserName=snap.val();});
    db.ref("users/"+user.uid+"/profileImage").once("value").then(snap=>{if(snap.exists()) currentUserImg=snap.val();});
    loadReviews();
  });

  const stars=document.querySelectorAll("#starRating span");
  let selectedStars=0;
  stars.forEach(star=>{star.addEventListener("click",()=>{selectedStars=parseInt(star.dataset.value); updateStars(selectedStars);});});
  function updateStars(rating){stars.forEach((s,i)=>s.classList.toggle("active",i<rating));}

  document.getElementById("submitReviewBtn").onclick=submitReview;

  function submitReview(){
    const text=document.getElementById("reviewText").value.trim();
    const lang=localStorage.getItem("lang")||"ar";
    if(!selectedStars || !text) return alert(t[lang].starsError);

    const data={
      uid:currentUid,
      name:currentUserName,
      profileImage:currentUserImg,
      stars:selectedStars,
      text,
      timestamp:new Date().toISOString(),
      reactions:{heart:{},like:{},dislike:{}}
    };

    const key=db.ref().child("reviews").push().key;
    db.ref("reviews/"+key).set(data).then(()=>{
      document.getElementById("reviewText").value="";
      selectedStars=0; updateStars(0);
      loadReviews();
    });
  }

  function loadReviews(){
    const container=document.getElementById("reviewsList");
    db.ref("reviews").on("value",snapshot=>{
      container.innerHTML="";
      if(!snapshot.exists()){ container.innerHTML="<p>لا توجد تقييمات بعد.</p>"; return; }
      const reviews=Object.entries(snapshot.val()).sort((a,b)=>new Date(b[1].timestamp)-new Date(a[1].timestamp));
      reviews.forEach(([key,r])=>{
        const div=document.createElement("div"); div.className="review";

        const header=document.createElement("div"); header.className="review-header";
        const img=document.createElement("img"); img.src=r.profileImage||"https://via.placeholder.com/40";
        const nameDiv=document.createElement("div"); nameDiv.textContent=r.name||"---";
        header.appendChild(img); header.appendChild(nameDiv);
        div.appendChild(header);

        const starsDiv=document.createElement("div"); starsDiv.textContent="★".repeat(r.stars);
        div.appendChild(starsDiv);

        const textP=document.createElement("p"); textP.textContent=r.text;
        div.appendChild(textP);

        const metaDiv=document.createElement("div"); metaDiv.className="meta"; metaDiv.textContent=new Date(r.timestamp).toLocaleString("ar-EG");
        div.appendChild(metaDiv);

        if(currentUid==="mlifDgEAkKMaOeuUq63cs5NAkV93"){
          const btn=document.createElement("button"); btn.className="delete-btn"; btn.textContent=t[localStorage.getItem("lang")||"ar"].deleteBtn;
          btn.onclick=()=>{ if(confirm("هل أنت متأكد من حذف هذا التقييم؟")) db.ref("reviews/"+key).remove(); };
          div.appendChild(btn);
        }

        container.appendChild(div);
      });
    });
  }
  </script>
</body>
</html>
