<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>التقييمات</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Cairo&display=swap');
    body {
      font-family: 'Cairo', sans-serif;
      background: #e3f2fd;
      margin: 0;
      padding: 20px;
      color: #222;
    }
    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 30px 40px;
      border-radius: 16px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }
    h2 {
      text-align: center;
      color: #1976d2;
      margin-bottom: 25px;
      font-weight: 700;
    }
    label {
      font-weight: 600;
      margin-top: 15px;
      display: block;
    }
    input[type="text"], textarea {
      width: 100%;
      padding: 12px 15px;
      margin-top: 8px;
      border-radius: 10px;
      border: 1.8px solid #90caf9;
      font-size: 16px;
      resize: vertical;
      transition: border-color 0.3s ease;
    }
    input[type="text"]:focus, textarea:focus {
      outline: none;
      border-color: #1976d2;
      box-shadow: 0 0 8px #90caf9aa;
    }
    button {
      background-color: #1976d2;
      color: white;
      font-weight: 700;
      border: none;
      border-radius: 12px;
      padding: 12px 15px;
      font-size: 16px;
      margin-top: 12px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }
    button:hover {
      background-color: #115293;
    }
    .stars {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin: 15px 0 10px 0;
    }
    .stars span {
      font-size: 28px;
      cursor: pointer;
      color: #222;
      transition: color 0.3s ease, transform 0.3s ease;
      user-select: none;
    }
    .stars span.active { color: #ffd700; }
    .review {
      background: #f1f9ff;
      border-left: 6px solid #1976d2;
      padding: 20px 25px;
      margin-bottom: 20px;
      border-radius: 12px;
      position: relative;
    }
    .review img {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: 8px;
    }
    .review .name {
      font-weight: bold;
    }
    .meta {
      font-size: 13px;
      color: #555;
      margin-top: 10px;
      font-style: italic;
    }
    .delete-btn {
      margin-top: 8px;
      background: #e53935;
      color: white;
      border: none;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      box-shadow: 0 2px 6px rgba(229, 57, 53, 0.5);
      transition: background-color 0.3s ease;
    }
    .delete-btn:hover { background: #b71c1c; }
  </style>
</head>
<body>
  <div class="container">
    <h2 id="reviewsTitle">⭐ تقييمات المستخدمين</h2>
    <label id="starsLabel">اختر عدد النجوم:</label>
    <div class="stars" id="starRating">
      <span data-value="1">&#9733;</span>
      <span data-value="2">&#9733;</span>
      <span data-value="3">&#9733;</span>
      <span data-value="4">&#9733;</span>
      <span data-value="5">&#9733;</span>
    </div>
    <textarea id="reviewText" placeholder="اكتب تعليقك هنا..." rows="4"></textarea>
    <button id="submitBtn" onclick="submitReview()">إرسال التقييم</button>

    <div id="reviewsList">جار التحميل...</div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAYcZ2_RjaI4fjP14QlqbUbL3rWvPPWnas",
      authDomain: "sheko-store.firebaseapp.com",
      databaseURL: "https://sheko-store-default-rtdb.firebaseio.com",
      projectId: "sheko-store",
      storageBucket: "sheko-store.appspot.com",
      messagingSenderId: "113892775847",
      appId: "1:113892775847:web:2aa4c11c3f5dd1d15f0882"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.database();

    const badWords = ["fuck","shit","bitch","asshole","كلب","حرامي","وسخ"];

    function containsBadWords(text){
      const lower = text.toLowerCase();
      return badWords.some(word => lower.includes(word));
    }

    let currentUid = null;
    let currentUser = {name:"", photo:""};

    auth.onAuthStateChanged(user=>{
      if(!user) return location.href="index.html";
      currentUid = user.uid;

      // جلب اسم المستخدم والصورة
      db.ref("users/"+user.uid).once("value").then(snap=>{
        const data = snap.val();
        if(data){
          currentUser.name = data.username || "";
          currentUser.photo = data.profileImage || "https://via.placeholder.com/40";
        }
      });

      loadReviews();
    });

    let selectedStars = 0;
    document.querySelectorAll("#starRating span").forEach((star,index)=>{
      star.onclick = ()=>{
        selectedStars = parseInt(star.dataset.value);
        updateStars(selectedStars);
      };
    });
    function updateStars(rating){
      document.querySelectorAll("#starRating span").forEach((s,i)=>{
        s.classList.toggle("active", i<rating);
      });
    }

    const langText = {
      ar:{
        stars:"اختر عدد النجوم:",
        submit:"إرسال التقييم",
        reviews:"⭐ تقييمات المستخدمين",
        noReviews:"لا توجد تقييمات بعد.",
        loading:"جار التحميل...",
        placeholder:"اكتب تعليقك هنا..."
      },
      en:{
        stars:"Select number of stars:",
        submit:"Submit Review",
        reviews:"⭐ User Reviews",
        noReviews:"No reviews yet.",
        loading:"Loading...",
        placeholder:"Write your comment here..."
      }
    };

    function getLang(){ return localStorage.getItem("lang")||"ar"; }

    function applyLangAll(){
      const lang = getLang();
      document.body.dir = lang==="ar"?"rtl":"ltr";
      document.getElementById("starsLabel").innerText = langText[lang].stars;
      document.getElementById("submitBtn").innerText = langText[lang].submit;
      document.getElementById("reviewsTitle").innerText = langText[lang].reviews;
      document.getElementById("reviewText").placeholder = langText[lang].placeholder;
    }

    applyLangAll();

    function submitReview(){
      const text = document.getElementById("reviewText").value.trim();
      if(!selectedStars || !text){
        alert("يرجى اختيار عدد النجوم وكتابة تعليقك.");
        return;
      }
      if(containsBadWords(text)){
        alert("يرجى تجنب الكلمات السيئة.");
        return;
      }

      const data = {
        uid: currentUid,
        name: currentUser.name,
        photo: currentUser.photo,
        stars: selectedStars,
        text: text,
        timestamp: new Date().toISOString()
      };

      const key = db.ref().child("reviews").push().key;
      db.ref("reviews/"+key).set(data).then(()=>{
        document.getElementById("reviewText").value="";
        selectedStars=0;
        updateStars(0);
        loadReviews();
      });
    }

    function loadReviews(){
      const container = document.getElementById("reviewsList");
      container.innerText = langText[getLang()].loading;

      db.ref("reviews").orderByChild("timestamp").on("value", snapshot=>{
        container.innerHTML = "";
        if(!snapshot.exists()){
          container.innerText = langText[getLang()].noReviews;
          return;
        }

        const reviews = Object.entries(snapshot.val()).sort((a,b)=>new Date(b[1].timestamp)-new Date(a[1].timestamp));
        reviews.forEach(([key,r])=>{
          const div = document.createElement("div");
          div.className = "review";

          div.innerHTML = `
            <img src="${r.photo||'https://via.placeholder.com/40'}" />
            <span class="name">${r.name||"---"}</span> 
            <span>⭐${"★".repeat(r.stars)}</span>
            <p>${r.text}</p>
            <div class="meta">${new Date(r.timestamp).toLocaleString(getLang()==="ar"?"ar-EG":"en-US")}</div>
          `;

          // زر حذف فقط للأدمن
          if(currentUid==="mlifDgEAkKMaOeuUq63cs5NAkV93"){
            const btn = document.createElement("button");
            btn.className="delete-btn";
            btn.innerText="🗑 حذف";
            btn.onclick = ()=>{ db.ref("reviews/"+key).remove(); };
            div.appendChild(btn);
          }

          container.appendChild(div);
        });
      });
    }
  </script>
</body>
</html>
