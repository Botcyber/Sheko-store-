<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8" />
  <title>حسابي</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

  <style>
    body {
      font-family: 'Cairo', sans-serif;
      background: linear-gradient(to bottom right, #e3f2fd, #fce4ec);
      margin: 0;
      direction: rtl;
    }

    .container {
      max-width: 420px;
      margin: 60px auto;
      background: white;
      padding: 30px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0,0,0,.15);
      text-align: center;
    }

    .profile-img-wrapper {
      margin-top: -80px;
      margin-bottom: 20px;
    }

    #profileImage {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 5px solid #fff;
      object-fit: cover;
      cursor: pointer;
    }

    input[type="file"] { display: none; }

    h2 {
      margin-bottom: 25px;
      font-weight: bold;
    }

    .info-card {
      background: #f8f9fa;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
      text-align: right;
    }

    .info-card label {
      font-weight: bold;
      display: block;
      margin-bottom: 6px;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      margin-top: 10px;
      font-family: 'Cairo';
    }

    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      margin-top: 12px;
    }

    .btn-blue { background: #007bff; color: white; }
    .btn-red { background: #dc3545; color: white; }

    /* زر الرجوع */
    .back-btn {
      position: fixed;
      top: 10px;
      right: 10px;
      background: #007bff;
      color: white;
      padding: 8px 14px;
      border-radius: 10px;
      text-decoration: none;
      font-weight: bold;
      z-index: 9999;
    }

    /* قائمة اللغة */
    #langMenu {
      position: fixed;
      top: 55px;
      right: 10px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 12px rgba(0,0,0,.2);
      overflow: hidden;
      z-index: 9999;
    }

    #langMenu button {
      width: 100%;
      padding: 8px 14px;
      border: none;
      background: white;
      cursor: pointer;
      font-family: 'Cairo';
      font-weight: bold;
    }

    #langMenu button:hover {
      background: #f1f1f1;
    }
  </style>
</head>

<body>

<a href="dashboard.html" class="back-btn">↩ الرجوع</a>

<div id="langMenu">
  <button onclick="setLang('ar')">🇪🇬 عربي</button>
  <button onclick="setLang('en')">🇺🇸 English</button>
</div>

<div class="container">

  <div class="profile-img-wrapper">
    <label for="profileImageInput">
      <img id="profileImage" src="https://via.placeholder.com/120" />
    </label>
    <input type="file" id="profileImageInput" accept="image/*">
  </div>

  <h2 id="pageTitle">معلومات حسابك</h2>

  <div class="info-card">
    <label id="emailLabel">📧 البريد الإلكتروني:</label>
    <div id="email">...</div>
  </div>

  <div class="info-card">
    <label id="usernameLabel">👤 اسم المستخدم:</label>
    <div id="username">---</div>
    <input type="text" id="newUsername" placeholder="أدخل اسم مستخدم جديد">
    <button class="btn-blue" id="btnSetUsername">تأكيد اسم المستخدم</button>
  </div>

  <button class="btn-red" id="btnDeleteAccount">🗑️ حذف الحساب نهائيًا</button>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAYcZ2_RjaI4fjP14QlqbUbL3rWvPPWnas",
  authDomain: "sheko-store.firebaseapp.com",
  databaseURL: "https://sheko-store-default-rtdb.firebaseio.com",
  projectId: "sheko-store",
  storageBucket: "sheko-store.appspot.com",
  messagingSenderId: "113892775847",
  appId: "1:113892775847:web:2aa4c11c3f5dd1d15f0882"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

/* اللغات */
const translations = {
  ar: {
    back: "↩ الرجوع",
    title: "معلومات حسابك",
    email: "📧 البريد الإلكتروني:",
    username: "👤 اسم المستخدم:",
    placeholder: "أدخل اسم مستخدم جديد",
    confirm: "تأكيد اسم المستخدم",
    delete: "🗑️ حذف الحساب نهائيًا"
  },
  en: {
    back: "↩ Back",
    title: "Account Information",
    email: "📧 Email:",
    username: "👤 Username:",
    placeholder: "Enter new username",
    confirm: "Confirm Username",
    delete: "🗑️ Delete Account"
  }
};

function applyLang(lang) {
  localStorage.setItem("siteLang", lang);
  document.body.style.direction = lang === "ar" ? "rtl" : "ltr";

  document.querySelector(".back-btn").innerText = translations[lang].back;
  document.getElementById("pageTitle").innerText = translations[lang].title;
  document.getElementById("emailLabel").innerText = translations[lang].email;
  document.getElementById("usernameLabel").innerText = translations[lang].username;
  document.getElementById("newUsername").placeholder = translations[lang].placeholder;
  document.getElementById("btnSetUsername").innerText = translations[lang].confirm;
  document.getElementById("btnDeleteAccount").innerText = translations[lang].delete;
}

function setLang(lang) {
  applyLang(lang);
}

window.addEventListener("load", () => {
  applyLang(localStorage.getItem("siteLang") || "ar");
});

/* تحميل بيانات المستخدم */
auth.onAuthStateChanged(user => {
  if (!user) return location.href = "index.html";
  document.getElementById("email").innerText = user.email;
});
</script>

</body>
</html>
