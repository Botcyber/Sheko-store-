<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>الدردشة - VIBE Studio</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet" />
<style>
body { font-family: 'Cairo', sans-serif; margin:0; padding:0; display:flex; flex-direction:column; height:100vh; background: linear-gradient(45deg, #fffbdb, #fff);}
header { background:#ffb700; padding:10px; text-align:center; font-weight:bold; font-size:1.5rem; box-shadow:0 2px 5px rgba(0,0,0,0.2); position:relative;}
#onlineCount { position:absolute; left:15px; top:10px; font-size:0.9rem; display:flex; flex-direction:column; align-items:center;}
#onlineCount .eye { font-size:1.4rem; user-select:none;}
#chatContainer { flex:1; padding:10px; overflow-y:auto;}
.message { display:flex; margin-bottom:12px; align-items:flex-start; position:relative;}
.message.own { flex-direction: row-reverse;}
.avatar { width:48px; height:48px; border-radius:50%; margin:0 10px; overflow:hidden; cursor:pointer; position:relative;}
.avatar img { width:100%; height:100%; object-fit:cover;}
.content { background:#ffb700; color:#222; padding:10px 15px; border-radius:15px; max-width:70%; position:relative; word-break:break-word;}
.message.own .content { background:#222; color:#ffb700;}
.username { font-weight:bold; font-size:0.9rem; margin-bottom:5px;}
.timestamp { font-size:0.7rem; color:#555; margin-top:4px;}
.delete-btn { background:#dc3545; border:none; color:#fff; padding:5px 10px; border-radius:10px; cursor:pointer; margin:auto 8px; align-self:center; font-size:0.8rem; transition:background-color 0.3s ease;}
.delete-btn:hover { background-color:#b02a37;}
#inputContainer { display:flex; padding:10px; background:#eee; border-top:1px solid #ccc; flex-direction:column;}
#messageInput { flex:1; padding:10px; border-radius:20px; border:1px solid #ccc; font-family:'Cairo', sans-serif; font-size:1rem; width:100%; box-sizing:border-box;}
#sendBtn { margin-top:8px; border:none; padding:10px 20px; border-radius:20px; background:#ffb700; font-weight:bold; cursor:pointer; font-size:1rem; transition: background-color 0.3s ease; align-self:flex-end;}
#sendBtn:hover { background-color:#e6a600;}
#userInfoPopup { position:fixed; top:20%; left:50%; transform:translateX(-50%); background:white; padding:20px 25px; border-radius:15px; box-shadow:0 8px 25px rgba(0,0,0,0.25); max-width:320px; z-index:1000; display:none; direction:rtl; font-family:'Cairo', sans-serif; text-align:center;}
#userInfoPopup .closeBtn { position:absolute; top:8px; left:10px; font-size:1.2rem; cursor:pointer; font-weight:bold; user-select:none;}
#userInfoPopup img { width:100px; height:100px; border-radius:50%; object-fit:cover; margin-bottom:10px; box-shadow:0 3px 10px rgba(0,0,0,0.2);}
#userInfoPopup h3 { margin:5px 0; font-weight:900; font-size:1.3rem; color:#ffb700;}
#userInfoPopup .badges { margin:10px 0; display:flex; justify-content:center; gap:10px; flex-wrap:wrap;}
#userInfoPopup .badge { background:#ffb700; color:#222; padding:5px 10px; border-radius:12px; font-weight:bold; font-size:0.85rem; box-shadow:0 1px 5px rgba(0,0,0,0.2);}
#userInfoPopup .vip { background:linear-gradient(45deg, gold, orange); color:#111; font-size:1rem; padding:8px 15px; border-radius:20px; box-shadow:0 2px 8px rgba(255,165,0,0.7);}
#overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.3); z-index:900; display:none;}
#replyBox { background:#ffb700; padding:8px 15px; border-radius:20px; margin-bottom:8px; color:#222; font-weight:bold; cursor:pointer; user-select:none;}
</style>
</head>
<body>

<header>
  <div id="onlineCount">
    <div class="eye" title="المستخدمون المتصلون">👁</div>
    <div id="onlineNumber">0</div>
  </div>
  دردشة VIBE Studio
</header>

<div id="chatContainer"></div>

<div id="inputContainer">
  <input type="text" id="messageInput" placeholder="اكتب رسالتك هنا..." autocomplete="off"/>
  <button id="sendBtn">إرسال</button>
</div>

<div id="overlay"></div>
<div id="userInfoPopup">
  <div class="closeBtn" title="إغلاق">×</div>
  <img id="popupImage" src="" alt="صورة المستخدم"/>
  <h3 id="popupName">اسم المستخدم</h3>
  <div class="badges" id="popupBadges"></div>
  <div class="vip" id="popupVIP" style="display:none;"></div>
  <div id="popupRank"></div>
</div>

<!-- Firebase Scripts -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-storage-compat.js"></script>

<script>
// ====================== الترجمات ======================
const translations = {
  ar: { headerTitle:"دردشة VIBE Studio", onlineUsers:"المستخدمون المتصلون", messagePlaceholder:"اكتب رسالتك هنا...", sendBtn:"إرسال", closeBtn:"إغلاق", userPlaceholder:"مستخدم", replyPrefix:"رد على", confirmDelete:"هل أنت متأكد من حذف هذه الرسالة؟", chatClosed:"الدردشة مغلقة حالياً", bannedMsg:"تم حظرك من الدردشة", deleteBtn:"حذف" },
  en: { headerTitle:"VIBE Studio Chat", onlineUsers:"Online Users", messagePlaceholder:"Type your message here...", sendBtn:"Send", closeBtn:"Close", userPlaceholder:"User", replyPrefix:"Reply to", confirmDelete:"Are you sure you want to delete this message?", chatClosed:"Chat is currently closed", bannedMsg:"You are banned from chat", deleteBtn:"Delete" }
};

function setLanguage(lang){
  document.querySelector("header").childNodes.forEach(node=>{ if(node.nodeType===Node.TEXT_NODE) node.textContent=translations[lang].headerTitle;});
  document.getElementById("onlineCount").querySelector(".eye").title = translations[lang].onlineUsers;
  messageInput.placeholder = translations[lang].messagePlaceholder;
  sendBtn.textContent = translations[lang].sendBtn;
  document.querySelector("#userInfoPopup .closeBtn").title = translations[lang].closeBtn;
  document.querySelectorAll(".message").forEach(msgDiv=>{
    const usernameDiv = msgDiv.querySelector(".username");
    if(usernameDiv && usernameDiv.textContent==="مستخدم") usernameDiv.textContent=translations[lang].userPlaceholder;
    const replyDiv = msgDiv.querySelector("div[style*='border-left']");
    if(replyDiv) replyDiv.textContent=replyDiv.textContent.replace(/رد على|Reply to/,translations[lang].replyPrefix);
    const delBtn = msgDiv.querySelector(".delete-btn");
    if(delBtn && (delBtn.textContent==="حذف"||delBtn.textContent==="Delete")) delBtn.textContent=translations[lang].deleteBtn;
  });
  if(messageInput.disabled && sendBtn.textContent.includes("الدردشة")) sendBtn.textContent=translations[lang].chatClosed;
}
setLanguage("ar"); // العربية افتراضياً

// ====================== Firebase Config ======================
const firebaseConfig = {
  apiKey: "AIzaSyAYcZ2_RjaI4fjP14QlqbUbL3rWvPPWnas",
  authDomain: "sheko-store.firebaseapp.com",
  databaseURL: "https://sheko-store-default-rtdb.firebaseio.com",
  projectId: "sheko-store",
  storageBucket: "sheko-store.appspot.com",
  messagingSenderId: "113892775847",
  appId: "1:113892775847:web:2aa4c11c3f5dd1d15f0882"
};
firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

const chatContainer = document.getElementById("chatContainer");
const messageInput = document.getElementById("messageInput");
const sendBtn = document.getElementById("sendBtn");
const onlineNumber = document.getElementById("onlineNumber");

const userInfoPopup = document.getElementById("userInfoPopup");
const overlay = document.getElementById("overlay");
const popupImage = document.getElementById("popupImage");
const popupName = document.getElementById("popupName");
const popupBadges = document.getElementById("popupBadges");
const popupVIP = document.getElementById("popupVIP");
const popupRank = document.getElementById("popupRank");
const closeBtn = userInfoPopup.querySelector(".closeBtn");

const reactionEmojis = ["❤️","😂","👍","👎"];
const specialBadgesForUser = { "mlifDgEAkKMaOeuUq63cs5NAkV93": { badges:["المؤسس","الأسطورة","المبرمج","الادمن"] } };

let currentUser;
let usersCache={};
let replyMessage=null;
let isChatOpen=true;
let isUserBanned=false;

// ====================== Auth & Listeners ======================
auth.onAuthStateChanged(user=>{
  if(!user) return location.href="index.html";
  currentUser = user;

  db.ref("usersOnline/"+user.uid).set(true);
  db.ref("usersOnline/"+user.uid).onDisconnect().remove();

  db.ref("bannedUsers/"+user.uid).once("value").then(snap=>{
    if(snap.exists()){
      isUserBanned=true;
      messageInput.disabled=true;
      sendBtn.disabled=true;
      sendBtn.textContent = translations["ar"].bannedMsg;
    }
  });

  listenForMessages();
});

db.ref("usersOnline").on("value", snap=>{
  const users = snap.val()||{};
  onlineNumber.textContent = Object.keys(users).length;
});

db.ref("chatSettings/isChatOpen").on("value", snap=>{
  isChatOpen = snap.val();
  if(!isChatOpen){
    messageInput.disabled = true;
    sendBtn.disabled = true;
    if(isUserBanned) return;
    sendBtn.textContent = translations["ar"].chatClosed;
  } else {
    if(!isUserBanned){
      messageInput.disabled=false;
      sendBtn.disabled=false;
      sendBtn.textContent=translations["ar"].sendBtn;
    }
  }
});

// ====================== Functions ======================
function getUserData(uid){
  return new Promise(resolve=>{
    if(usersCache[uid]) resolve(usersCache[uid]);
    else{
      db.ref("users/"+uid).once("value").then(userSnap=>{
        const data = userSnap.val()||{};
        db.ref(`userBadges/${uid}/badges`).once("value").then(badgesSnap=>{
          const badges = badgesSnap.val()||[];
          usersCache[uid] = {...data, badges, vip:specialBadgesForUser[uid]?.vip||data.vip||0};
          resolve(usersCache[uid]);
        });
      });
    }
  });
}

function renderMessage(id,msg){
  const msgDiv = document.createElement("div");
  msgDiv.className="message";
  if(msg.uid===currentUser.uid) msgDiv.classList.add("own");

  msgDiv.ondblclick=()=>{ replyMessage={ uid:msg.uid, text:msg.text, username: usersCache[msg.uid]?.username||translations["ar"].userPlaceholder}; showReplyUI(replyMessage);};

  const avatar = document.createElement("div"); avatar.className="avatar";
  getUserData(msg.uid).then(userData=>{
    avatar.innerHTML=`<img src="${userData.profileImage||'https://via.placeholder.com/48?text=صورة'}" alt="مستخدم" />`;
    avatar.onclick = ()=>showUserInfo(userData);
  });
  msgDiv.appendChild(avatar);

  const content = document.createElement("div"); content.className="content";
  const usernameDiv = document.createElement("div"); usernameDiv.className="username"; usernameDiv.textContent = usersCache[msg.uid]?.username||translations["ar"].userPlaceholder;
  content.appendChild(usernameDiv);

  if(msg.replyTo){
    const replyDiv = document.createElement("div");
    replyDiv.style="border-left:3px solid #ffb700; padding-left:8px; margin-bottom:5px; font-style:italic; color:#555;";
    replyDiv.textContent=`${translations["ar"].replyPrefix} ${msg.replyTo.username}: ${msg.replyTo.text}`;
    content.appendChild(replyDiv);
  }

  const textDiv = document.createElement("div"); textDiv.textContent=msg.text; content.appendChild(textDiv);
  const timeDiv = document.createElement("div"); timeDiv.className="timestamp"; timeDiv.textContent=new Date(msg.timestamp).toLocaleTimeString('ar-EG'); content.appendChild(timeDiv);

  const reactionsDiv = document.createElement("div"); reactionsDiv.style="margin-top:5px; display:flex; gap:8px;";
  if(!msg.reactions) msg.reactions={};
  reactionEmojis.forEach(emoji=>{
    const btn = document.createElement("button");
    const usersReacted = msg.reactions[emoji]||{};
    const count = Object.keys(usersReacted).length;
    btn.textContent=emoji+(count>0?" "+count:"");
    btn.style="background:none; border:none; cursor:pointer; font-size:1.2rem; user-select:none;";
    btn.onclick=()=>{
      const reactionsRef = db.ref("chatMessages/"+id+"/reactions/"+emoji);
      if(usersReacted[currentUser.uid]) reactionsRef.child(currentUser.uid).remove();
      else reactionsRef.child(currentUser.uid).set(true);
    };
    reactionsDiv.appendChild(btn);
  });
  content.appendChild(reactionsDiv);
  msgDiv.appendChild(content);

  if(msg.uid===currentUser.uid||currentUser.uid==="mlifDgEAkKMaOeuUq63cs5NAkV93"){
    const delBtn=document.createElement("button"); delBtn.className="delete-btn"; delBtn.textContent=translations["ar"].deleteBtn;
    delBtn.onclick=()=>{ if(confirm(translations["ar"].confirmDelete)) db.ref("chatMessages/"+id).remove(); };
    msgDiv.appendChild(delBtn);
  }
  return msgDiv;
}

function showUserInfo(userData){
  popupImage.src=userData.profileImage||'https://via.placeholder.com/100?text=صورة';
  popupName.textContent=userData.username||translations["ar"].userPlaceholder;
  popupBadges.innerHTML="";
  if(userData.badges?.length>0) userData.badges.forEach(b=>{ const span=document.createElement("span"); span.className="badge"; span.textContent=b; popupBadges.appendChild(span); });
  if(userData.vip && userData.vip>0){ popupVIP.style.display="block"; popupVIP.textContent=`VIP ${userData.vip}`; } else popupVIP.style.display="none";
  userInfoPopup.style.display="block"; overlay.style.display="block";
}

closeBtn.onclick=()=>{ userInfoPopup.style.display="none"; overlay.style.display="none";};
overlay.onclick=()=>{ userInfoPopup.style.display="none"; overlay.style.display="none"; hideReplyUI();};

function showReplyUI(replyMsg){
  if(document.getElementById("replyBox")) return;
  const replyBox = document.createElement("div"); replyBox.id="replyBox"; replyBox.textContent=`${translations["ar"].replyPrefix} ${replyMsg.username}: ${replyMsg.text}`;
  replyBox.onclick=()=>{ replyMessage=null; hideReplyUI(); };
  document.getElementById("inputContainer").insertBefore(replyBox,messageInput);
}

function hideReplyUI(){ const replyBox=document.getElementById("replyBox"); if(replyBox) replyBox.remove(); replyMessage=null; }

sendBtn.onclick=()=>{
  const text = messageInput.value.trim();
  if(text==="") return;
  if(isUserBanned){ alert(translations["ar"].bannedMsg); return;}
  if(!isChatOpen){ alert(translations["ar"].chatClosed); return;}

  const newMsgRef=db.ref("chatMessages").push();
  const msgData={ uid:currentUser.uid, text, timestamp:Date.now() };
  if(replyMessage) msgData.replyTo={ uid:replyMessage.uid, text:replyMessage.text, username:replyMessage.username};
  newMsgRef.set(msgData).then(()=>{ messageInput.value=""; hideReplyUI(); });
};

function listenForMessages(){
  db.ref("chatMessages").on("value",snapshot=>{
    const messages = snapshot.val()||{};
    chatContainer.innerHTML="";
    const sortedMessages = Object.entries(messages)..sort((a,b)=> a[1].timestamp - b[1].timestamp ); // ترتيب الرسائل حسب الوقت

    sortedMessages.forEach(([id,msg])=>{
      renderMessage(id,msg).thenOrSync? chatContainer.appendChild(renderMessage(id,msg)) : chatContainer.appendChild(renderMessage(id,msg));
    });

    chatContainer.scrollTop = chatContainer.scrollHeight;
  });
}

// لتوافق القديم والجديد renderMessage
// لو renderMessage ترجع Promise (عشان getUserData async) لازم نتأكد
function renderMessage(id,msg){
  const msgDiv = document.createElement("div");
  msgDiv.className="message";
  if(msg.uid===currentUser.uid) msgDiv.classList.add("own");

  msgDiv.ondblclick=()=>{ 
    replyMessage={ uid:msg.uid, text:msg.text, username: usersCache[msg.uid]?.username||translations["ar"].userPlaceholder}; 
    showReplyUI(replyMessage);
  };

  const avatar = document.createElement("div"); avatar.className="avatar";
  getUserData(msg.uid).then(userData=>{
    avatar.innerHTML=`<img src="${userData.profileImage||'https://via.placeholder.com/48?text=صورة'}" alt="مستخدم" />`;
    avatar.onclick = ()=>showUserInfo(userData);
  });
  msgDiv.appendChild(avatar);

  const content = document.createElement("div"); content.className="content";
  const usernameDiv = document.createElement("div"); usernameDiv.className="username"; usernameDiv.textContent = usersCache[msg.uid]?.username||translations["ar"].userPlaceholder;
  content.appendChild(usernameDiv);

  if(msg.replyTo){
    const replyDiv = document.createElement("div");
    replyDiv.style="border-left:3px solid #ffb700; padding-left:8px; margin-bottom:5px; font-style:italic; color:#555;";
    replyDiv.textContent=`${translations["ar"].replyPrefix} ${msg.replyTo.username}: ${msg.replyTo.text}`;
    content.appendChild(replyDiv);
  }

  const textDiv = document.createElement("div"); textDiv.textContent=msg.text; content.appendChild(textDiv);
  const timeDiv = document.createElement("div"); timeDiv.className="timestamp"; timeDiv.textContent=new Date(msg.timestamp).toLocaleTimeString('ar-EG'); content.appendChild(timeDiv);

  // ردود التفاعلات
  const reactionsDiv = document.createElement("div"); reactionsDiv.style="margin-top:5px; display:flex; gap:8px;";
  if(!msg.reactions) msg.reactions={};
  reactionEmojis.forEach(emoji=>{
    const btn = document.createElement("button");
    const usersReacted = msg.reactions[emoji]||{};
    const count = Object.keys(usersReacted).length;
    btn.textContent=emoji+(count>0?" "+count:"");
    btn.style="background:none; border:none; cursor:pointer; font-size:1.2rem; user-select:none;";
    btn.onclick=()=>{
      const reactionsRef = db.ref("chatMessages/"+id+"/reactions/"+emoji);
      if(usersReacted[currentUser.uid]) reactionsRef.child(currentUser.uid).remove();
      else reactionsRef.child(currentUser.uid).set(true);
    };
    reactionsDiv.appendChild(btn);
  });
  content.appendChild(reactionsDiv);

  msgDiv.appendChild(content);

  if(msg.uid===currentUser.uid||currentUser.uid==="mlifDgEAkKMaOeuUq63cs5NAkV93"){
    const delBtn=document.createElement("button"); delBtn.className="delete-btn"; delBtn.textContent=translations["ar"].deleteBtn;
    delBtn.onclick=()=>{ if(confirm(translations["ar"].confirmDelete)) db.ref("chatMessages/"+id).remove(); };
    msgDiv.appendChild(delBtn);
  }

  return msgDiv;
}

// ====================== الرد على الرسائل ======================
function showReplyUI(replyMsg){
  if(document.getElementById("replyBox")) return;
  const replyBox = document.createElement("div"); 
  replyBox.id="replyBox"; 
  replyBox.textContent=`${translations["ar"].replyPrefix} ${replyMsg.username}: ${replyMsg.text}`;
  replyBox.onclick=()=>{ replyMessage=null; hideReplyUI(); };
  document.getElementById("inputContainer").insertBefore(replyBox,messageInput);
}

function hideReplyUI(){ const replyBox=document.getElementById("replyBox"); if(replyBox) replyBox.remove(); replyMessage=null; }

// ====================== إغلاق صفحة الدردشة ======================
window.onbeforeunload = ()=>{
  if(currentUser){
    db.ref("usersOnline/"+currentUser.uid).remove();
  }
};
</script>
</body>
</html>
